services:
  app:
    build:
      context: .
      args:
        # Подпуть, под которым приложение отдаётся за reverse-proxy (напр. /finance/).
        # По умолчанию '/'. Задаётся в .env как VITE_BASE=/finance/
        VITE_BASE: ${VITE_BASE:-/}
    container_name: finance
    restart: unless-stopped
    ports:
      # Слушаем только на localhost — наружу приложение отдаётся через reverse-proxy
      # (nginx). Для прямого доступа по IP:порту замените на '${APP_PORT:-3000}:3000'.
      - '127.0.0.1:${APP_PORT:-3000}:3000'
    environment:
      # Секрет для подписи JWT — обязательно поменяйте
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      # PIN по умолчанию для двух пользователей при первом запуске
      DEFAULT_PIN: ${DEFAULT_PIN:-1234}
      # Токен подписки Claude Max (получить: claude setup-token)
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-8}
    volumes:
      - finance-data:/data

volumes:
  finance-data:
